pid /tmp/nginx.pid;

client_body_temp_path /tmp/client_temp;
proxy_temp_path /tmp/proxy_temp;
fastcgi_temp_path /tmp/fastcgi_temp;
uwsgi_temp_path /tmp/uwsgi_temp;
scgi_temp_path /tmp/scgi_temp;

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime config — never cache so deployments pick up changes immediately.
    # By default this serves the file from disk (volume-mounted or baked in).
    # Set APP_CONFIG_URL at container startup to proxy to an external source
    # (e.g. S3) instead — see nginx/nginx.conf.template.
    location = /app-config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Hashed static assets can be cached aggressively
    location ~* \.(js|css|woff2?|png|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
